const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

window.storage = {
  get: async function(key, shared){
    const { data, error } = await supabaseClient
      .from('app_storage')
      .select('value')
      .eq('key', key)
      .maybeSingle();
    if (error) throw error;
    if (!data) throw new Error('not found');
    return { key: key, value: data.value, shared: shared };
  },
  set: async function(key, value, shared){
    const { error } = await supabaseClient
      .from('app_storage')
      .upsert({ key: key, value: value }, { onConflict: 'key' });
    if (error) throw error;
    return { key: key, value: value, shared: shared };
  },
  delete: async function(key, shared){
    const { error } = await supabaseClient
      .from('app_storage')
      .delete()
      .eq('key', key);
    if (error) throw error;
    return { key: key, deleted: true, shared: shared };
  }
};

  let saveStructureTimer = null;
  async function saveStructure(s){

    saveStructureTimer = setTimeout(async function(){
      try {
        await window.storage.set('structure', JSON.stringify(s), true);
      } catch(e){
        console.error('Erreur sauvegarde structure (sera retentée au prochain changement):', e);
      }
      saveStructureTimer = null;
    }, 350);
    // Résout immédiatement : l'affichage utilise déjà l'état en mémoire à jour,
    // l'écriture réelle est regroupée en arrière-plan pour éviter les rafales de clics.
    return Promise.resolve();
  }
  async function getProgress(sublieuId){

      // enregistrement), on la remet à zéro immédiatement au lieu de l'afficher cochée.
      if (p.validated){
        const resetProgress = { checked: [], operator: null, validated: false, validatedAt: null, comment: '' };
        await setProgress(sublieuId, resetProgress);
        return resetProgress;
      }
      return p;
    } catch(e){
      return { checked: [], operator: null, validated: false, validatedAt: null, comment: '' };
    }
  }

  function mondayOf(date){
    const d = new Date(date);
    const day = d.getDay();
    const diff = (day === 0 ? -6 : 1) - day;
    d.setDate(d.getDate()+diff);
    d.setHours(0,0,0,0);
    return d;
  }

  function openPdfReliably(dataUrl, filename){
    try {
      const parts = dataUrl.split(',');
      const mimeMatch = parts[0].match(/:(.*?);/);
      const mime = mimeMatch ? mimeMatch[1] : 'application/pdf';
      const binary = atob(parts[1]);
      const bytes = new Uint8Array(binary.length);
      for (let i=0; i<binary.length; i++){ bytes[i] = binary.charCodeAt(i); }
      const blob = new Blob([bytes], { type: mime });
      const blobUrl = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = blobUrl;
      a.download = filename || 'document.pdf';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function(){ URL.revokeObjectURL(blobUrl); }, 60000);
    } catch(e){
      console.error('Erreur ouverture PDF:', e);
      window.open(dataUrl, '_blank');
    }
  }

        if (counts[r] !== undefined && (!f.readBy || !f.readBy[r])) counts[r]++;
      });
    });
    return counts;

  function dayKeyOf(date){
    return date.getFullYear()+'-'+String(date.getMonth()+1).padStart(2,'0')+'-'+String(date.getDate()).padStart(2,'0');
  }
  function dayLabelOf(dayKey){
    const [y,m,d] = dayKey.split('-');
    const noms = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
    return parseInt(d,10)+' '+noms[parseInt(m,10)-1]+' '+y;
  }
  function dayLabelWithWeekday(dayKey){
    const joursNoms = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
    const d = new Date(dayKey);
    return joursNoms[d.getDay()]+' '+dayLabelOf(dayKey);
  }
  function monthKeyOf(date){
    return date.getFullYear()+'-'+String(date.getMonth()+1).padStart(2,'0');
  }
  function monthLabelOf(monthKey){
    const [y,m] = monthKey.split('-');
    const noms = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
    return noms[parseInt(m,10)-1] + ' ' + y;
  }

  function findCategory(id){ return state.structure.categories.find(c=>c.id===id); }
  function findSublieu(catId, subId){
    function search(list){
      for (const s of list){
        if (s.id === subId) return s;
        if (s.sublieux){ const found = search(s.sublieux); if (found) return found; }
      }
      return null;
    }
    return search(findCategory(catId).sublieux);
  }

  async function doValidateChecklist(){
    const subId = state.sublieuId;
    const cat = findCategory(state.categoryId);
    const sub = findSublieu(state.categoryId, subId);
    const p = state.progress[subId];
    const textarea = document.getElementById('checklist-comment');
    if (textarea) p.comment = textarea.value;
    const validatedAt = nowLabel();
    const operatorAtValidation = p.operator;
    const tasksSnapshot = sub.tasks.map(function(t){ return { label: t.label, checked: p.checked.indexOf(t.id) >= 0 }; });
    await addHistorique({
      id: 'hist-'+Date.now()+'-'+Math.random().toString(36).slice(2,7),
      categoryId: cat.id,
      categoryName: cat.name,
      sublieuName: sub.name,
      operator: operatorAtValidation,
      when: validatedAt,
      comment: p.comment || '',
      tasksSnapshot: tasksSnapshot
    });
    // La checklist est remise à zéro systématiquement une fois validée,
    // pour pouvoir être refaite dans la journée si la salle/le poste ressert.
    const resetProgress = { checked: [], operator: null, validated: false, validatedAt: null, comment: '' };
    await setProgress(subId, resetProgress);
    state.progress[subId] = resetProgress;
    state.historique = await getHistorique();
    state.screen = (state.categoryId === 'fermeture') ? 'fermeture' : 'home';
    render();
  }

      if (idx >= 0 && pos !== idx){
        const [f] = fridges.splice(idx, 1);
        fridges.splice(pos, 0, f);
        const grouped = {};
        sub.products.forEach(function(p){ const loc = p.location||'Autres'; grouped[loc] = grouped[loc]||[]; grouped[loc].push(p); });
        let newProducts = [];
        fridges.forEach(function(fr){ newProducts = newProducts.concat(grouped[fr]||[]); });
        sub.products = newProducts;
        await saveStructure(state.structure);
      }
      render();
    }
    else if (action === 'adminReqAddFridge'){
      const nameInput = document.getElementById('new-fridge-name');
      const prodInput = document.getElementById('new-fridge-first-product');
      const unitInput = document.getElementById('new-fridge-first-unit');
      const parInput = document.getElementById('new-fridge-first-parstock');
      const name = (nameInput.value||'').trim();
      const prodName = (prodInput.value||'').trim();
      if (!name || !prodName){
        state.adminReqError = 'Indique un nom de frigo et un premier produit.';
        render();
        return;
      }
      const sub = findSublieu(state.adminReqCatId, state.adminReqSubId);
      const parVal = parInput.value.trim();
      sub.products.push({ location: name, name: prodName, unit: unitInput.value.trim(), parstock: parVal ? Number(parVal) : null });
      await saveStructure(state.structure);
      state.adminReqError = false;
      render();
    }
    else if (action === 'adminReqStartEditProduct'){
      state.adminReqEditingProductIndex = payload;
      render();
    }
    else if (action === 'adminReqCancelEditProduct'){
      state.adminReqEditingProductIndex = null;
      render();
    }
    else if (action === 'adminReqSaveEditProduct'){
      const sub = findSublieu(state.adminReqCatId, state.adminReqSubId);
      const product = sub.products[payload];
      if (product){
        const name = document.getElementById('edit-product-name').value.trim();
        const unit = document.getElementById('edit-product-unit').value.trim();
        const parVal = document.getElementById('edit-product-parstock').value.trim();
        if (name) product.name = name;
        product.unit = unit;
        product.parstock = parVal ? Number(parVal) : null;
        await saveStructure(state.structure);
      }
      state.adminReqEditingProductIndex = null;
      render();
    }
    else if (action === 'adminReqDeleteProduct'){
      const sub = findSublieu(state.adminReqCatId, state.adminReqSubId);
      sub.products.splice(payload, 1);
      await saveStructure(state.structure);
      render();
    }
    else if (action === 'adminReqMoveProductToPosition'){
      const sub = findSublieu(state.adminReqCatId, state.adminReqSubId);
      const gi = payload.globalIndex;
      const loc = sub.products[gi] ? (sub.products[gi].location||'Autres') : null;
      if (loc !== null){
        const indices = [];
        sub.products.forEach(function(p, i){ if ((p.location||'Autres') === loc) indices.push(i); });
        const localIdx = indices.indexOf(gi);
        let pos = (payload.position||1) - 1;
        if (pos < 0) pos = 0;
        if (pos > indices.length-1) pos = indices.length-1;
        if (pos !== localIdx){
          const [item] = sub.products.splice(gi, 1);
          const newIndices = [];
          sub.products.forEach(function(p, i){ if ((p.location||'Autres') === loc) newIndices.push(i); });
          const insertAt = pos >= newIndices.length ? (newIndices.length ? newIndices[newIndices.length-1]+1 : sub.products.length) : newIndices[pos];
          sub.products.splice(insertAt, 0, item);
          await saveStructure(state.structure);
        }
      }
      render();
    }
    else if (action === 'adminReqAddProduct'){
      const sub = findSublieu(state.adminReqCatId, state.adminReqSubId);
      const fridges = [];
      sub.products.forEach(function(p){ const loc = p.location||'Autres'; if (fridges.indexOf(loc)===-1) fridges.push(loc); });
      const fIdx = fridges.indexOf(payload);
      const name = (document.getElementById('new-product-name-'+fIdx).value||'').trim();
      const unit = (document.getElementById('new-product-unit-'+fIdx).value||'').trim();
      const parVal = (document.getElementById('new-product-parstock-'+fIdx).value||'').trim();
      if (!name){ render(); return; }
      let insertAt = -1;
      for (let i=0;i<sub.products.length;i++){ if ((sub.products[i].location||'Autres') === payload) insertAt = i; }
      const newProduct = { location: payload, name: name, unit: unit, parstock: parVal ? Number(parVal) : null };
      if (insertAt === -1) sub.products.push(newProduct);
      else sub.products.splice(insertAt+1, 0, newProduct);
      await saveStructure(state.structure);
      render();
    }
    else if (action === 'adminToggleCategory'){
      state.adminExpandedCategory = state.adminExpandedCategory === payload ? null : payload;
      state.adminExpandedSublieu = null;
      state.adminExpandedNested = null;
      state.adminEditingTaskId = null;
      state.adminEditingListItem = null;
      render();
    }
    else if (action === 'adminToggleSublieu'){
      state.adminExpandedSublieu = state.adminExpandedSublieu === payload ? null : payload;
      state.adminExpandedNested = null;
      state.adminEditingTaskId = null;
      state.adminEditingListItem = null;
      render();
    }
    else if (action === 'adminToggleNested'){
      state.adminExpandedNested = state.adminExpandedNested === payload ? null : payload;
      state.adminEditingTaskId = null;
      state.adminEditingListItem = null;
      render();
    }
    else if (action === 'deleteNestedSublieu'){
      const submenu = findSublieu(payload.catId, payload.subId);
      submenu.sublieux = submenu.sublieux.filter(s=>s.id!==payload.nestedId);
      await saveStructure(state.structure);
      render();
    }
    else if (action === 'addFridge'){
      const input = document.getElementById('new-fridge-'+payload.catId+'-'+payload.subId);
      const n = (input.value||'').trim();
      if (!n) return;
      const sub = findSublieu(payload.catId, payload.subId);
      sub.fridges.push(n);
      await saveStructure(state.structure);
      render();
    }
    else if (action === 'deleteFridge'){
      const sub = findSublieu(payload.catId, payload.subId);
      sub.fridges.splice(payload.index, 1);
      await saveStructure(state.structure);
      render();
    }
    else if (action === 'addRequisitionProduct'){
      const input = document.getElementById('new-product-'+payload.catId+'-'+payload.subId+(payload.nestedId?'-'+payload.nestedId:''));
      const n = (input.value||'').trim();
      if (!n) return;
      const target = payload.nestedId ? findSublieu(payload.catId, payload.nestedId) : findSublieu(payload.catId, payload.subId);
      target.products.push(n);
      await saveStructure(state.structure);
      render();
    }
    else if (action === 'deleteRequisitionProduct'){
      const target = findSublieu(payload.catId, payload.nestedId || payload.subId);
      target.products.splice(payload.index, 1);
      await saveStructure(state.structure);
      render();
    }
    else if (action === 'startEditListItem'){
      state.adminEditingListItem = payload;
      render();
    }
    else if (action === 'cancelEditListItem'){
      state.adminEditingListItem = null;
      render();
    }
    else if (action === 'saveEditListItem'){
      const idPart = payload.nestedId ? payload.subId+'-'+payload.nestedId : payload.subId;
      const input = document.getElementById('edit-list-input-'+idPart+'-'+payload.listKey+'-'+payload.index);
      const newValue = (input.value||'').trim();
      if (!newValue) return;
      const target = payload.listKey === 'fridges' ? findSublieu(payload.catId, payload.subId) : findSublieu(payload.catId, payload.nestedId || payload.subId);
      const list = payload.listKey === 'fridges' ? target.fridges : target.products;
      if (list[payload.index] && typeof list[payload.index] === 'object'){
        list[payload.index].name = newValue;
      } else {
        list[payload.index] = newValue;
      }
      state.adminEditingListItem = null;
      await saveStructure(state.structure);
      render();
    }
    else if (action === 'moveListItemToPosition'){
      const target = payload.listKey === 'fridges' ? findSublieu(payload.catId, payload.subId) : findSublieu(payload.catId, payload.nestedId || payload.subId);
      const list = payload.listKey === 'fridges' ? target.fridges : target.products;
      const idx = payload.index;
      let pos = (payload.position||1) - 1;
      if (pos < 0) pos = 0;
      if (pos > list.length-1) pos = list.length-1;
      if (pos !== idx){
        const [item] = list.splice(idx, 1);
        list.splice(pos, 0, item);
        await saveStructure(state.structure);
      }
      render();
    }
    else if (action === 'toggleCategory'){
      state.expanded = state.expanded === payload ? null : payload;
      state.expandedSubmenu = null;
      render();
    }
    else if (action === 'toggleSubmenu'){
      state.expandedSubmenu = state.expandedSubmenu === payload ? null : payload;
      render();
    }
    else if (action === 'openSublieu'){
      state.structure = await loadStructure();
      state.categoryId = payload.catId;
      state.sublieuId = payload.subId;
      state.confirmValidateAnyway = false;
      const sub = findSublieu(payload.catId, payload.subId);
      if (sub.type === 'pertes'){
        state.perteSaved = false;
        state.screen = 'pertes-form';
        render();
        return;
      }
      if (sub.type === 'temperatures'){
        state.temperatureSaved = false;
        state.temperatureChecklistChecked = {};
        state.temperatureChecklistError = false;
        state.screen = 'temperatures-form';
        render();
        return;
      }
      if (sub.type === 'tracabilite'){
        state.tracabiliteSaved = false;
        state.screen = 'tracabilite-form';
        render();
        return;
      }
      if (sub.type === 'requisition'){
        state.requisitionSaved = false;
        state.requisitionDraft = {};
        state.requisitionFridgeIndex = 0;
        state.screen = 'requisition-form';
        render();
        return;
      }
      state.progress[payload.subId] = await getProgress(payload.subId);
      if (!state.progress[payload.subId].operator){
        state.progress[payload.subId].operator = state.name;
      }
      state.screen = 'checklist';
      render();
    }
    else if (action === 'savePerte'){
      const cat = findCategory(state.categoryId);
      const sub = findSublieu(state.categoryId, state.sublieuId);
      const produitInput = document.getElementById('perte-produit');
      const quantiteInput = document.getElementById('perte-quantite');
      const raisonSelect = document.getElementById('perte-raison');
      const raisonAutreInput = document.getElementById('perte-raison-autre');
      const produit = (produitInput.value||'').trim();
      const quantite = (quantiteInput.value||'').trim();
      let raison = raisonSelect.value;
      if (raison === 'Autre'){
        const detail = (raisonAutreInput.value||'').trim();
        if (detail) raison = 'Autre : ' + detail;
      }
      if (!produit || !quantite){
        state.perteError = true;
        render();
        return;
      }
      state.perteError = false;
      const now = new Date();
      await addPerte({
        id: 'perte-'+Date.now(),
        product: produit,
        quantity: quantite,
        reason: raison,
        operator: state.name,
        categoryName: cat.name,
        sublieuName: sub.name,
        when: nowLabel(),
        monthKey: monthKeyOf(now)
      });
      state.perteSaved = true;
      render();
    }
    else if (action === 'toggleTemperatureChecklistItem'){
      state.temperatureChecklistChecked = state.temperatureChecklistChecked || {};
      state.temperatureChecklistChecked[payload] = !state.temperatureChecklistChecked[payload];
      state.temperatureChecklistError = false;
      render();
    }
    else if (action === 'saveTracabilite'){
      const cat = findCategory(state.categoryId);
      const sub = findSublieu(state.categoryId, state.sublieuId);
      const entries = sub.products.map(function(product, i){
        if (product.isBeurre){
          const fab = document.getElementById('traca-fab-'+i);
          const ddm = document.getElementById('traca-ddm-'+i);
          return { name: product.name, isBeurre: true, fabrication: fab ? fab.value : '', ddm: ddm ? ddm.value : '' };
        }
        const dlc = document.getElementById('traca-dlc-'+i);
        const lot = document.getElementById('traca-lot-'+i);
        return { name: product.name, isBeurre: false, dlc: dlc ? dlc.value : '', lot: lot ? lot.value.trim() : '' };
      });
      await addTracabiliteRecord({
        id: 'traca-'+Date.now(),
        operator: state.name,
        categoryName: cat.name,
        sublieuName: sub.name,
        when: nowLabel(),
        dayKey: dayKeyOf(new Date()),
        entries: entries
      });
      state.tracabiliteSaved = true;
      render();
    }
    else if (action === 'saveTemperatures'){
      const cat = findCategory(state.categoryId);
      const sub = findSublieu(state.categoryId, state.sublieuId);
      if (sub.checklistItems && sub.checklistItems.some(function(item){
        return item.obligatoire && !(state.temperatureChecklistChecked && state.temperatureChecklistChecked[item.id]);
      })){
        state.temperatureChecklistError = true;
        render();
        return;
      }
      state.temperatureChecklistError = false;
      const readings = sub.fridges.map(function(fridge, i){
        const fridgeName = typeof fridge === 'object' ? fridge.name : fridge;
        const input = document.getElementById('temp-input-'+i);
        const val = (input && input.value !== '') ? input.value.trim() : null;
        return { fridge: fridgeName, value: val };
      });
      const commentInput = document.getElementById('temperature-comment');
      await addTemperatureReading({
        id: 'temp-'+Date.now(),
        operator: state.name,
        categoryName: cat.name,
        sublieuName: sub.name,
        when: nowLabel(),
        readings: readings,
        checklistConfirmed: (sub.checklistItems||[]).filter(function(item){
          return state.temperatureChecklistChecked && state.temperatureChecklistChecked[item.id];
        }).map(function(item){ return item.label; }),
        comment: commentInput ? commentInput.value.trim() : ''
      });
      state.temperatureSaved = true;
      state.temperatureChecklistChecked = {};
      render();
    }
    else if (action === 'requisitionNextFridge' || action === 'requisitionPrevFridge'){
      const sub = findSublieu(state.categoryId, state.sublieuId);
      captureCurrentFridgeInputs(sub);
      const locations = getRequisitionLocations(sub);
      let idx = state.requisitionFridgeIndex || 0;
      idx += (action === 'requisitionNextFridge') ? 1 : -1;
      if (idx < 0) idx = locations.length - 1;
      if (idx >= locations.length) idx = 0;
      state.requisitionFridgeIndex = idx;
      render();
    }
    else if (action === 'saveRequisition'){
      const cat = findCategory(state.categoryId);
      const sub = findSublieu(state.categoryId, state.sublieuId);
      const now = new Date();
      const isRich = sub.products.length > 0 && typeof sub.products[0] === 'object';
      let products;
      if (isRich){
        captureCurrentFridgeInputs(sub);
        const draft = state.requisitionDraft || {};
        const byName = {};
        Object.keys(draft).forEach(function(key){
          const val = parseFloat((draft[key]||'').replace(',', '.'));
          if (!val) return;
          const sepIdx = key.indexOf('|');
          const loc = key.slice(0, sepIdx);
          const name = key.slice(sepIdx+1);
          if (!byName[name]){
            const ref = sub.products.find(function(p){ return p.name === name; });
            byName[name] = { name: name, unit: (ref && ref.unit) || '', locations: [], quantity: 0 };
          }
          byName[name].quantity += val;
          byName[name].locations.push(loc);
        });
        products = Object.keys(byName).map(function(name){
          const item = byName[name];
          return { name: item.name, location: item.locations.join(' + '), unit: item.unit, quantity: String(item.quantity) };
        });
      } else {
        products = sub.products.map(function(product, i){
          const input = document.getElementById('requi-input-'+i);
          const val = (input && input.value !== '') ? input.value.trim() : '0';
          return { name: product, quantity: val };
        }).filter(function(p){ return p.quantity && p.quantity !== '0'; });
      }
      const commentInput = document.getElementById('requisition-comment');
      await addRequisition({
        id: 'requi-'+Date.now(),
        operator: state.name,
        categoryName: cat.name,
        sublieuName: sub.name,
        when: nowLabel(),
        dayKey: dayKeyOf(now),
        products: products,
        comment: commentInput ? commentInput.value.trim() : ''
      });
      state.requisitionSaved = true;
      state.requisitionDraft = {};
      state.requisitionFridgeIndex = 0;
      render();
    }
    else if (action === 'backToSublieux'){
      state.structure = await loadStructure();
      state.screen = (state.categoryId === 'fermeture') ? 'fermeture' : 'home';
      render();
    }
    else if (action === 'toggleTask'){
      const subId = state.sublieuId;
      const p = state.progress[subId];
      const idx = p.checked.indexOf(payload);
      if (idx>=0) p.checked.splice(idx,1); else p.checked.push(payload);
      render();
      setProgress(subId, p);
    }
    else if (action === 'saveComment'){
      const subId = state.sublieuId;
      const p = state.progress[subId];
      const textarea = document.getElementById('checklist-comment');
      p.comment = textarea ? textarea.value : p.comment;
      await setProgress(subId, p);
    }
    else if (action === 'validate'){
      const subId = state.sublieuId;
      const sub = findSublieu(state.categoryId, subId);
      const p = state.progress[subId];
      const allChecked = sub.tasks.length > 0 && p.checked.length === sub.tasks.length;
      if (!allChecked){
        state.confirmValidateAnyway = true;
        render();
        return;
      }
      await doValidateChecklist();
    }
    else if (action === 'confirmValidateAnyway'){
      state.confirmValidateAnyway = false;
      await doValidateChecklist();
    }
    else if (action === 'cancelValidateAnyway'){
      state.confirmValidateAnyway = false;
      render();
    }
    else if (action === 'deleteCategory'){
      state.structure.categories = state.structure.categories.filter(c=>c.id!==payload);
      await saveStructure(state.structure);
      render();
    }
    else if (action === 'deleteSublieu'){
      const cat = findCategory(payload.catId);
      cat.sublieux = cat.sublieux.filter(s=>s.id!==payload.subId);
      await saveStructure(state.structure);
      render();
    }
    else if (action === 'addTask'){
      const labelInput = document.getElementById('new-task-label-'+payload.catId+'-'+payload.subId);
      const label = (labelInput.value||'').trim();
      if (!label) return;
      const sub = findSublieu(payload.catId, payload.subId);
      sub.tasks.push({ id:'task-'+Date.now(), label:label });
      await saveStructure(state.structure);
      render();
    }
    else if (action === 'deleteTask'){
      const sub = findSublieu(payload.catId, payload.subId);
      sub.tasks = sub.tasks.filter(t=>t.id!==payload.taskId);
      await saveStructure(state.structure);
      render();
    }
    else if (action === 'startEditTask'){
      state.adminEditingTaskId = payload;
      render();
    }
    else if (action === 'cancelEditTask'){
      state.adminEditingTaskId = null;
      render();
    }
    else if (action === 'saveEditTask'){
      const input = document.getElementById('edit-task-input-'+payload.taskId);
      const newLabel = (input.value||'').trim();
      if (!newLabel) return;
      const sub = findSublieu(payload.catId, payload.subId);
      const task = sub.tasks.find(t=>t.id===payload.taskId);
      if (task) task.label = newLabel;
      state.adminEditingTaskId = null;
      await saveStructure(state.structure);
      render();
    }
    else if (action === 'moveTaskToPosition'){
      const sub = findSublieu(payload.catId, payload.subId);
      const idx = sub.tasks.findIndex(t=>t.id===payload.taskId);
      let target = (payload.position||1) - 1;
      if (target < 0) target = 0;
      if (target > sub.tasks.length-1) target = sub.tasks.length-1;
      if (idx >= 0 && target !== idx){
        const [item] = sub.tasks.splice(idx, 1);
        sub.tasks.splice(target, 0, item);
        await saveStructure(state.structure);
      }
      render();
    }
  };

  function esc(s){
    return String(s).replace(/[&<>"']/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }
  // Échappement dédié pour un texte injecté comme argument JS à l'intérieur d'un attribut onclick="...".
  // esc() seul ne suffit pas ici : un guillemet simple non protégé dans la chaîne JS pourrait
  // casser hors du littéral et permettre une injection de code (XSS stocké via un nom saisi par un manager).
  function escJs(s){
    return String(s)
      .replace(/\\/g, '\\\\')
      .replace(/'/g, "\\'")
      .replace(/\n/g, '\\n')
      .replace(/\r/g, '')
      .replace(/</g, '\\x3C')
      .replace(/"/g, '&quot;');
  }

  function bottomNav(active){
    function item(id, label, ic, action){
      const isActive = active === id;
      const color = isActive ? 'var(--text-accent, #185FA5)' : 'var(--text-muted)';
      return '<div onclick="appAction(\''+action+'\')" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:10px 0;cursor:pointer;color:'+color+'">'+
        icon(ic,22)+'<span style="font-size:12px">'+label+'</span></div>';
    }
    let items = item('home','Accueil','home','goHome');
    if (state.managerUnlocked){
      items += item('menu','Menu','settings','goManagerMenu');
    } else {
      items += item('other','Autre Accès','settings','goOtherAccessMenu');
    }
    return '<div style="display:flex;border-top:1px solid var(--border);margin-top:12px">'+items+'</div>';
  }

      {bg:'#2AB0C5', fg:'#1A1A1A'},

      'ateliers': 'Remplir les checklists',
      'bar': 'Pertes, Nettoyage, Températures, Réqui',

    visibleCategories.forEach(function(cat, catIndex){
      const isOpen = state.expanded === cat.id;

        (subtitle ? '<div style="font-size:12px;color:var(--text-secondary);margin-top:2px">'+esc(subtitle)+'</div>' : '')+

        '<div style="color:var(--text-muted);transform:rotate('+(isOpen?'180':'0')+'deg)">'+icon('chevronDown',18)+'</div>'+

        out += '<div style="border-top:1px solid var(--border);padding:10px;display:flex;flex-direction:column;gap:8px;background:var(--surface-0)">';

        }
        cat.sublieux.forEach(function(sub){
          if (sub.type === 'submenu'){
            const subMenuOpen = state.expandedSubmenu === sub.id;
            out += '<div style="border:2.5px solid var(--border-strong,var(--border));border-radius:10px;background:var(--surface-1);overflow:hidden">';

              '<div style="flex:1;font-size:14px;font-weight:500;letter-spacing:.2px">'+esc(sub.name.toUpperCase())+'</div>'+
              '<div style="color:var(--text-muted);transform:rotate('+(subMenuOpen?'180':'0')+'deg)">'+icon('chevronDown',16)+'</div>'+
            '</div>';

              out += '<div style="border-top:1px solid var(--border);padding:8px;display:flex;flex-direction:column;gap:6px;background:var(--surface-0)">';

                  '<div style="flex:1;font-size:13px;font-weight:500;letter-spacing:.2px">'+esc(nested.name.toUpperCase())+'</div>'+
                  icon('chevronRight',15)+
                '</div>';

              out += '</div>';

            return;

            icon('chevronRight',16)+
          '</div>';
        });
        out += '</div>';
      }
      out += '</div>';

  function getRequisitionLocations(sub){
    const locations = [];
    sub.products.forEach(function(p){
      const loc = p.location || 'Autres';
      if (locations.indexOf(loc) === -1) locations.push(loc);
    });
    return locations;
  }
  function requiInputId(location, name){
    return 'requi-input-' + (location+'|'+name).replace(/[^a-zA-Z0-9]/g, '_');
  }
  function captureCurrentFridgeInputs(sub){
    const locations = getRequisitionLocations(sub);
    const idx = Math.max(0, Math.min(state.requisitionFridgeIndex||0, locations.length-1));
    const currentLocation = locations[idx];
    if (!currentLocation) return;
    const productsHere = sub.products.filter(function(p){ return (p.location||'Autres') === currentLocation; });
    state.requisitionDraft = state.requisitionDraft || {};
    productsHere.forEach(function(p){
      const el = document.getElementById(requiInputId(currentLocation, p.name));
      if (el){
        const key = currentLocation+'|'+p.name;
        if (el.value !== ''){ state.requisitionDraft[key] = el.value; }
        else { delete state.requisitionDraft[key]; }
      }
    });
  }

  function renderWhatsupCalendar(daysBefore, daysAfter){
    const dayNames = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
    const days = [];
    const today = new Date();
    today.setHours(0,0,0,0);
    const todayKeyStr = dayKeyOf(today);
    let start = new Date(today);
    let end = new Date(today.getFullYear(), 11, 31);
    if (daysBefore != null && daysAfter != null){
      start.setDate(start.getDate() - daysBefore);
      const limited = new Date(today);
      limited.setDate(limited.getDate() + daysAfter);
      if (limited < end) end = limited;
    }
    for (let d = new Date(start); d <= end; d.setDate(d.getDate()+1)){
      days.push({ key: dayKeyOf(d), label: dayNames[d.getDay()]+' '+dayLabelOf(dayKeyOf(d)) });
    }
    let out = '<div style="padding:0 8px">'+
      '<div id="whatsup-scroll" style="display:flex;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;gap:0">';
    days.forEach(function(day){
      const events = (state.events||[]).filter(function(e){ return e.date === day.key; });
      const sheets = (state.eventSheets||[]).filter(function(e){ return e.date === day.key; });
      const rhEvs = (state.rhEvents||[]).filter(function(e){ return e.date === day.key; });
      const isToday = day.key === todayKeyStr;
      out += '<div'+(isToday?' id="whatsup-today-card"':'')+' style="flex:0 0 100%;scroll-snap-align:center;box-sizing:border-box;padding:8px">'+
        '<div style="border:2.5px solid var(--border-strong,var(--border));border-radius:14px;background:var(--surface-1);box-shadow:4px 4px 0 var(--border-strong,#000);padding:18px;height:220px;overflow-y:auto">'+
          '<div class="mama-title" style="font-size:16px;color:var(--text-accent,#E8432B);text-align:center;margin-bottom:14px">'+esc(day.label)+'</div>';
      if (events.length === 0 && sheets.length === 0 && rhEvs.length === 0){
        out += '<div style="text-align:center;color:var(--text-muted);font-size:14px;padding:30px 10px">Rien de prévu ce jour-là.</div>';
      } else {
        rhEvs.forEach(function(rh){
          out += '<div style="border:2px solid var(--border-strong,var(--border));border-radius:10px;padding:12px;margin-bottom:10px;background:var(--surface-0)">'+
            '<span style="display:inline-block;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.3px;color:#fff;background:#3FAE6A;padding:2px 8px;border-radius:999px;margin-bottom:6px">RH</span>'+
            '<div style="font-size:14px;font-weight:700;color:var(--text-primary)">'+esc(rh.type)+'</div>'+
          '</div>';
        });
        events.forEach(function(ev){
          out += '<div style="border:2px solid var(--border-strong,var(--border));border-radius:10px;padding:12px;margin-bottom:10px;background:var(--surface-0)">'+
            '<span style="display:inline-block;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.3px;color:#fff;background:#FF8AB4;padding:2px 8px;border-radius:999px;margin-bottom:6px">Entertainment</span>'+
            '<div style="font-size:14px;font-weight:700;color:var(--text-primary)">'+esc(ev.type)+'</div>'+
            (ev.info ? '<div style="font-size:13px;color:var(--text-secondary);margin-top:4px">'+esc(ev.info)+'</div>' : '')+
          '</div>';
        });
        sheets.forEach(function(sh){
          const locs = (sh.locations && sh.locations.length) ? sh.locations.join(', ') : '';
          out += '<div style="border:2px solid var(--border-strong,var(--border));border-radius:10px;padding:12px;margin-bottom:10px;background:var(--surface-0)">'+
            '<span style="display:inline-block;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.3px;color:#fff;background:#7A5FE0;padding:2px 8px;border-radius:999px;margin-bottom:6px">Events</span>'+
            (locs ? '<div style="font-size:14px;font-weight:700;color:var(--text-primary)">'+esc(locs)+'</div>' : '')+
            (sh.guests ? '<div style="font-size:13px;color:var(--text-secondary);margin-top:2px">'+esc(sh.guests)+' guests</div>' : '')+
            (sh.note ? '<div style="font-size:13px;color:var(--text-secondary);margin-top:4px">'+esc(sh.note)+'</div>' : '')+
          '</div>';
        });
      }
      out += '</div></div>';
    });
    out += '</div></div>';
    out += '<p style="text-align:center;color:var(--text-muted);font-size:12px;margin:6px 0 4px">Fais glisser pour voir les jours suivants</p>';
    if (daysBefore != null && daysAfter != null){
      out += '<div onclick="appAction(\'goWhatsup\')" style="text-align:center;margin:4px 0 8px"><span style="font-size:13px;font-weight:700;color:var(--text-accent,#185FA5);text-decoration:underline;cursor:pointer">Voir tout le calendrier jusqu\'à fin d\'année</span></div>';
    }
    return out;
  }

        out += '<div style="font-size:13px;color:var(--text-secondary);margin-top:4px">'+esc(t.categoryName)+' · Par '+esc(t.operator)+' · '+esc(t.when)+'</div>';

          out += '<div style="margin-top:10px;display:flex;flex-direction:column;gap:4px">';
          t.checklistConfirmed.forEach(function(label){
            out += '<div style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-success,#3B6D11)">'+icon('check',14)+'<span>'+esc(label)+'</span></div>';
          });
          out += '</div>';
        }
        if (t.comment){
          out += '<div style="font-size:13px;color:var(--text-primary);margin-top:12px;padding:10px;border-radius:8px;background:var(--surface-0)">'+esc(t.comment)+'</div>';
        }
        out += '</div>';

        out += '<div style="margin-top:14px;display:flex;flex-direction:column;gap:8px">';
        (t.readings||[]).forEach(function(r){
          out += '<div style="display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px;border:2px solid var(--border-strong,var(--border));border-radius:10px;background:var(--surface-1)">'+
            '<div style="font-size:14px;font-weight:600;color:var(--text-primary)">'+esc(r.fridge)+'</div>'+
            '<div style="font-size:14px;font-weight:700;color:var(--text-accent,#E8432B)">'+(r.value!==null && r.value!=='' ? esc(r.value)+' °C' : '—')+'</div>'+
          '</div>';
        });
        out += '</div>';
        out += '</div>';
        return out;
      }
    }

    // Niveau 3 : détail d'un rapport précis
    if (state.historiqueReportId){
      const h = state.historique.find(function(x){ return x.id === state.historiqueReportId; });
      if (!h){ state.historiqueReportId = null; }
      else {
        let out = '<div style="padding:8px 16px">';
        out += '<div onclick="appAction(\'backHistoriqueReports\')" style="display:flex;align-items:center;gap:8px;color:var(--text-secondary);cursor:pointer;margin-bottom:12px;font-size:14px">'+icon('back',18)+'<span>Retour</span></div>';
        out += '<div style="border:2.5px solid var(--border-strong,var(--border));border-radius:12px;background:var(--surface-1);box-shadow:3px 3px 0 var(--border-strong,#000);padding:16px">';
        out += '<div class="mama-title" style="font-size:16px;color:var(--text-primary)">'+esc(h.sublieuName)+'</div>';
        out += '<div style="font-size:13px;color:var(--text-secondary);margin-top:4px">'+esc(h.categoryName)+' · Par '+esc(h.operator)+' · '+esc(h.when)+'</div>';
        if (h.comment){
          out += '<div style="font-size:13px;color:var(--text-primary);margin-top:12px;padding:10px;border-radius:8px;background:var(--surface-0)">'+esc(h.comment)+'</div>';
        }
        out += '</div>';

        out += '<div style="margin-top:14px;display:flex;flex-direction:column;gap:8px">';
        (h.tasksSnapshot||[]).forEach(function(t){
          out += '<div style="display:flex;align-items:center;gap:10px;padding:12px 14px;border:2px solid var(--border-strong,var(--border));border-radius:10px;background:'+(t.checked?'var(--bg-accent,#FFD500)':'var(--surface-1)')+'">'+
            '<div style="flex-shrink:0;width:18px;color:var(--text-primary)">'+(t.checked?icon('check',18):'')+'</div>'+
            '<div style="flex:1;font-size:14px;font-weight:600;color:var(--text-primary)">'+esc(t.label)+'</div>'+
          '</div>';
        });
        if (!h.tasksSnapshot || h.tasksSnapshot.length === 0){
          out += '<div style="padding:16px;color:var(--text-muted);font-size:14px;text-align:center">Pas de détail de tâches disponible pour ce rapport.</div>';
        }
        out += '</div>';
        out += '</div>';
        return out;
      }
    }

    // Niveau 2 : liste des rapports d'une zone (checklists + relevés fusionnés)
    if (state.historiqueZone){
      const reports = state.historique.filter(function(h){ return h.categoryName === state.historiqueZone; }).map(function(h){ return { kind:'checklist', data:h }; });
      const tempReadings = (state.temperatures||[]).filter(function(t){ return t.categoryName === state.historiqueZone; }).map(function(t){ return { kind:'temperature', data:t }; });
      const tracaReadings = (state.tracabilite||[]).filter(function(t){ return t.categoryName === state.historiqueZone; }).map(function(t){ return { kind:'tracabilite', data:t }; });
      let all = reports.concat(tempReadings).concat(tracaReadings);
      const typeFilter = state.historiqueTypeFilter || 'tous';
      if (typeFilter === 'temperature'){
        all = all.filter(function(item){ return item.kind === 'temperature'; });
      } else if (typeFilter === 'tracabilite'){
        all = all.filter(function(item){ return item.kind === 'tracabilite'; });
      } else if (typeFilter === 'nettoyage'){
        all = all.filter(function(item){ return item.kind === 'checklist' && /nettoyage/i.test(item.data.sublieuName); });
      } else if (typeFilter === 'checklists'){
        all = all.filter(function(item){ return item.kind === 'checklist' && !/nettoyage/i.test(item.data.sublieuName); });
      }
      let out = '<div style="padding:8px 16px;display:flex;flex-direction:column;gap:10px">';
      out += '<div onclick="appAction(\'backHistoriqueZones\')" style="display:flex;align-items:center;gap:8px;color:var(--text-secondary);cursor:pointer;margin-bottom:4px;font-size:14px">'+icon('back',18)+'<span>Retour aux zones</span></div>';
      out += '<div class="mama-title" style="font-size:14px;color:var(--text-secondary);margin-bottom:2px">Rapports</div>';
      const filterOptions = [
        {id:'tous', label:'Tous'},
        {id:'checklists', label:'Checklists'},
        {id:'nettoyage', label:'Nettoyage'},
        {id:'temperature', label:'Température'},
        {id:'tracabilite', label:'Traçabilité'}
      ];
      out += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px">';
      filterOptions.forEach(function(f){
        const active = typeFilter === f.id;
        out += '<button onclick="appAction(\'setHistoriqueTypeFilter\',\''+f.id+'\')" style="padding:7px 12px;border-radius:999px;border:1.5px solid '+(active?'var(--text-accent,#185FA5)':'var(--border)')+';background:'+(active?'var(--text-accent,#185FA5)':'var(--surface-1)')+';color:'+(active?'#fff':'var(--text-secondary)')+';font-size:12px;font-weight:700;cursor:pointer">'+f.label+'</button>';
      });
      out += '</div>';
      if (all.length === 0){
        out += '<div style="padding:16px;color:var(--text-muted);font-size:14px;text-align:center">Aucun rapport pour ce filtre.</div>';
      }
      all.forEach(function(item){
        const r = item.data;
        const action = item.kind === 'temperature' ? 'openHistoriqueTemp' : (item.kind === 'tracabilite' ? 'openHistoriqueTraca' : 'openHistoriqueReport');
        out += '<div onclick="appAction(\''+action+'\',\''+r.id+'\')" style="padding:14px 16px;border:2.5px solid var(--border-strong,var(--border));border-radius:12px;background:var(--surface-1);box-shadow:3px 3px 0 var(--border-strong,#000);cursor:pointer;display:flex;align-items:center;justify-content:space-between">'+
          '<div><div style="font-size:15px;font-weight:600;color:var(--text-primary)">'+esc(r.sublieuName)+'</div>'+
          '<div style="font-size:13px;color:var(--text-secondary);margin-top:2px">Par '+esc(r.operator)+' · '+esc(r.when)+'</div></div>'+
          icon('chevronRight',18)+
        '</div>';
      });
      out += '</div>';
      return out;
    }

    // Niveau 1 : liste des zones
    const catNames = state.structure.categories.map(function(c){ return c.name; });
    const orderedNames = [];
    if (catNames.includes('Fermeture')) orderedNames.push('Fermeture');
    catNames.forEach(function(n){ if (n !== 'Fermeture' && orderedNames.indexOf(n) === -1) orderedNames.push(n); });
    const zoneNames = Array.from(new Set(orderedNames));
    let out = '<div style="padding:8px 16px;display:flex;flex-direction:column;gap:10px">';
    if (state.historique.length === 0){
      out += '<div style="padding:16px;color:var(--text-muted);font-size:14px;text-align:center">Aucune checklist validée pour l\'instant.</div>';
    }
    zoneNames.forEach(function(zoneName){
      const count = state.historique.filter(function(h){ return h.categoryName === zoneName; }).length
        + (state.temperatures||[]).filter(function(t){ return t.categoryName === zoneName; }).length
        + (state.tracabilite||[]).filter(function(t){ return t.categoryName === zoneName; }).length;
      out += '<div onclick="appAction(\'openHistoriqueZone\',\''+escJs(zoneName)+'\')" style="padding:16px;border:2.5px solid var(--border-strong,var(--border));border-radius:12px;background:var(--surface-1);box-shadow:3px 3px 0 var(--border-strong,#000);cursor:pointer;display:flex;align-items:center;justify-content:space-between">'+
        '<div class="mama-title" style="font-size:15px;color:var(--text-primary)">'+esc(zoneName)+'</div>'+
        '<div style="display:flex;align-items:center;gap:10px">'+
          '<span style="font-size:13px;color:var(--text-secondary)">'+count+' rapport'+(count>1?'s':'')+'</span>'+
          icon('chevronRight',18)+
        '</div>'+
      '</div>';
    });
    const pertesCount = (state.pertes||[]).length;
    out += '<div onclick="appAction(\'openHistoriqueZone\',\'Pertes\')" style="padding:16px;border:2.5px solid var(--border-strong,var(--border));border-radius:12px;background:var(--surface-1);box-shadow:3px 3px 0 var(--border-strong,#000);cursor:pointer;display:flex;align-items:center;justify-content:space-between">'+
      '<div class="mama-title" style="font-size:15px;color:var(--text-primary)">Pertes</div>'+
      '<div style="display:flex;align-items:center;gap:10px">'+
        '<span style="font-size:13px;color:var(--text-secondary)">'+pertesCount+' déclaration'+(pertesCount>1?'s':'')+'</span>'+
        icon('chevronRight',18)+
      '</div>'+
    '</div>';
    out += '</div>';
    return out;
  }

  function renderPertesHistorique(){
    const months = Array.from(new Set((state.pertes||[]).map(function(p){ return p.monthKey; })));
    if (!months.includes(state.historiqueMonth)) months.unshift(state.historiqueMonth);
    months.sort().reverse();
    const rows = (state.pertes||[]).filter(function(p){ return p.monthKey === state.historiqueMonth; });

    let out = '<div style="padding:8px 16px">';
    out += '<div onclick="appAction(\'backHistoriqueZones\')" style="display:flex;align-items:center;gap:8px;color:var(--text-secondary);cursor:pointer;margin-bottom:12px;font-size:14px">'+icon('back',18)+'<span>Retour aux zones</span></div>';
    out += '</div>';

    out += '<div style="padding:8px 16px" class="no-print">';
    out += '<div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap">'+
      '<select id="historique-month-select" onchange="appAction(\'setHistoriqueMonth\')" style="flex:1;min-width:140px;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--surface-1);color:var(--text-primary);font-size:14px">'+
      months.map(function(m){ return '<option value="'+m+'" '+(m===state.historiqueMonth?'selected':'')+'>'+monthLabelOf(m)+'</option>'; }).join('')+
      '</select>'+
      '<button onclick="appAction(\'downloadPertesCSV\')" style="padding:10px 14px;border-radius:8px;border:2px solid var(--border-strong,#000);background:var(--text-accent,#185FA5);color:#fff;font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.2px;box-shadow:2px 2px 0 var(--border-strong,#000);cursor:pointer;white-space:nowrap">Télécharger (CSV)</button>'+
      '<button onclick="appAction(\'copyPertesCSV\')" style="padding:10px 14px;border-radius:8px;border:none;background:none;color:var(--text-muted);font-size:13px;cursor:pointer;white-space:nowrap">Copier</button>'+
    '</div>';
    if (state.copyFeedback === true){
      out += '<p style="color:var(--text-success,#3B6D11);font-size:13px;margin:0 0 10px">Tableau copié — colle-le dans Excel ou un email.</p>';
    } else if (state.copyFeedback === 'error'){
      out += '<p style="color:var(--text-danger,#A32D2D);font-size:13px;margin:0 0 10px">La copie automatique n\'a pas fonctionné, copie manuellement les lignes ci-dessous.</p>';
    }
    out += '<p style="font-size:12px;color:var(--text-muted);margin:0 0 12px">Le fichier CSV s\'ouvre dans Excel et se joint directement à un e-mail pour la comptabilité.</p>';
    out += '</div>';

    out += '<div id="pertes-print-area" style="padding:8px 16px">';
    if (rows.length === 0){
      out += '<div style="padding:16px;color:var(--text-muted);font-size:14px;text-align:center">Aucune perte déclarée pour ce mois.</div>';
    } else {
      out += '<div style="overflow-x:auto;border:1px solid var(--border);border-radius:10px">'+
        '<table style="width:100%;border-collapse:collapse;font-size:13px">'+
        '<thead><tr style="background:var(--surface-0);text-align:left">'+
          '<th style="padding:8px">Date</th><th style="padding:8px">Produit</th><th style="padding:8px">Qté</th><th style="padding:8px">Raison</th><th style="padding:8px">Opérateur</th>'+
        '</tr></thead><tbody>';
      rows.forEach(function(p){
        out += '<tr style="border-top:1px solid var(--border)">'+
          '<td style="padding:8px">'+esc(p.when)+'</td>'+
          '<td style="padding:8px">'+esc(p.product)+'</td>'+
          '<td style="padding:8px">'+esc(p.quantity)+'</td>'+
          '<td style="padding:8px">'+esc(p.reason)+'</td>'+
          '<td style="padding:8px">'+esc(p.operator)+'</td>'+
        '</tr>';
      });
      out += '</tbody></table></div>';
    }
    out += '</div>';
    return out;
  }

  function screenHistorique(){
    let out = '<div style="padding:20px 16px 8px">'+
      '<div style="padding:14px 16px;border-radius:14px;border:2.5px solid var(--border-strong,var(--border));background:var(--surface-1);box-shadow:4px 4px 0 var(--border-strong,#000);display:flex;align-items:center;gap:12px">'+
        '<div onclick="appAction(\'goManagerMenu\')" style="cursor:pointer;color:var(--text-secondary)">'+icon('back',22)+'</div>'+
        '<h1 class="mama-title" style="font-size:20px;font-weight:800;margin:0;color:var(--text-primary);flex:1">Historique</h1>'+

      out += renderPertesHistorique();

    out += bottomNav('menu');

            '</div>';

          '<input id="new-product-parstock-'+fIdx+'" placeholder="Stock parfait" style="width:90px;padding:7px;border-radius:6px;border:1px solid var(--border);background:var(--surface-1);color:var(--text-primary);font-size:12px">'+

        '</div>';
        out += '</div>';
      }
      out += '</div>';
    });

    out += '<div style="padding:14px;border:2px dashed var(--border-strong,var(--border));border-radius:10px;background:var(--surface-1);margin-top:6px">'+
      '<div class="mama-title" style="font-size:13px;color:var(--text-primary);margin-bottom:8px">Ajouter un frigo</div>'+
      '<input id="new-fridge-name" placeholder="Nom du frigo" style="width:100%;box-sizing:border-box;padding:8px;margin-bottom:6px;border-radius:6px;border:1px solid var(--border);background:var(--surface-0);color:var(--text-primary);font-size:13px">'+
      '<div style="display:flex;gap:6px;flex-wrap:wrap">'+
        '<input id="new-fridge-first-product" placeholder="Premier produit" style="flex:2;min-width:120px;padding:8px;border-radius:6px;border:1px solid var(--border);background:var(--surface-0);color:var(--text-primary);font-size:13px">'+
        '<input id="new-fridge-first-unit" placeholder="Unité" style="width:70px;padding:8px;border-radius:6px;border:1px solid var(--border);background:var(--surface-0);color:var(--text-primary);font-size:13px">'+
        '<input id="new-fridge-first-parstock" placeholder="Stock parfait" style="width:90px;padding:8px;border-radius:6px;border:1px solid var(--border);background:var(--surface-0);color:var(--text-primary);font-size:13px">'+
      '</div>'+
      (state.adminReqError ? '<p style="color:var(--text-danger,#A32D2D);font-size:12px;margin:8px 0 0">'+esc(state.adminReqError)+'</p>' : '')+
      '<button onclick="appAction(\'adminReqAddFridge\')" style="width:100%;margin-top:8px;padding:10px;border-radius:8px;border:2px solid var(--border-strong,#000);background:var(--text-accent,#185FA5);color:#fff;font-size:13px;font-weight:800;text-transform:uppercase;cursor:pointer">Ajouter le frigo</button>'+
    '</div>';

    out += '</div>';
    out += bottomNav('menu');
    return out;
  }

  function screenAdmin(){
    let out = '<div style="padding:20px 16px 8px">'+
      '<div style="padding:14px 16px;border-radius:14px;border:2.5px solid var(--border-strong,var(--border));background:var(--surface-1);box-shadow:4px 4px 0 var(--border-strong,#000);display:flex;align-items:center;gap:12px">'+
        '<div onclick="appAction(\'goManagerMenu\')" style="cursor:pointer;color:var(--text-secondary)">'+icon('back',22)+'</div>'+
        '<div style="flex:1"><h1 class="mama-title" style="font-size:20px;font-weight:800;margin:0;color:var(--text-primary)">Admin</h1>'+
        '<p style="color:var(--text-secondary);margin:2px 0 0;font-size:14px">Gérer les catégories, sous-lieux et tâches</p></div>'+
      '</div>'+
    '</div>';

    out += '<div style="padding:8px 16px;display:flex;flex-direction:column;gap:10px">';
    state.structure.categories.forEach(function(cat){
      const catOpen = state.adminExpandedCategory === cat.id;
      out += '<div style="border:2.5px solid var(--border-strong,var(--border));border-radius:12px;background:var(--surface-1);overflow:hidden;box-shadow:4px 4px 0 var(--border-strong,#000)">';
      out += '<div onclick="appAction(\'adminToggleCategory\',\''+cat.id+'\')" style="display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer">'+
        '<div class="mama-title" style="flex:1;font-size:15px;color:var(--text-primary)">'+esc(cat.name)+'</div>'+
        '<span style="font-size:12px;color:var(--text-secondary)">'+cat.sublieux.length+' sous-lieu'+(cat.sublieux.length>1?'x':'')+'</span>'+
        '<div onclick="event.stopPropagation();appAction(\'deleteCategory\',\''+cat.id+'\')" style="color:var(--text-danger,#A32D2D);cursor:pointer">'+icon('trash',16)+'</div>'+
        '<div style="color:var(--text-muted);transform:rotate('+(catOpen?'180':'0')+'deg)">'+icon('chevronDown',18)+'</div>'+
      '</div>';

      if (catOpen){
        out += '<div style="border-top:1px solid var(--border);padding:10px;display:flex;flex-direction:column;gap:8px;background:var(--surface-0)">';

        cat.sublieux.forEach(function(sub){
          const subOpen = state.adminExpandedSublieu === sub.id;
          const subClickAction = sub.type === 'requisition'
            ? "appAction('adminReqOpenEditor', {catId:'"+cat.id+"', subId:'"+sub.id+"'})"
            : "appAction('adminToggleSublieu','"+sub.id+"')";
          out += '<div style="border:1.5px solid var(--border-strong,var(--border));border-radius:10px;background:var(--surface-1);overflow:hidden">';
          out += '<div onclick="'+subClickAction+'" style="display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer">'+
            '<div style="flex:1;font-size:14px;font-weight:600;color:var(--text-primary)">'+esc(sub.name)+
            '</div>'+
            '<div onclick="event.stopPropagation();appAction(\'deleteSublieu\', {catId:\''+cat.id+'\', subId:\''+sub.id+'\'})" style="color:var(--text-danger,#A32D2D);cursor:pointer">'+icon('trash',14)+'</div>'+
            (sub.type === 'requisition' ? icon('chevronRight',16) : '<div style="color:var(--text-muted);transform:rotate('+(subOpen?'180':'0')+'deg)">'+icon('chevronDown',16)+'</div>')+
          '</div>';

          if (subOpen){
            out += '<div style="border-top:1px solid var(--border);padding:10px 14px;background:var(--surface-0)">';
            if (sub.type === 'pertes'){
              out += '<p style="font-size:12px;color:var(--text-muted);margin:0">Ce sous-lieu ouvre le formulaire de déclaration de pertes (produit, quantité, raison) — pas de tâches à gérer ici.</p>';
            } else if (sub.type === 'requisition'){
              sub.products.forEach(function(product, i){
                out += renderAdminStringRow(cat.id, sub.id, 'products', product, i, sub.products.length);
              });
              out += '<div style="display:flex;gap:6px;margin-top:8px;align-items:center">'+
                '<input id="new-product-'+cat.id+'-'+sub.id+'" placeholder="Nouveau produit" style="flex:1;padding:8px;border-radius:6px;border:1px solid var(--border);background:var(--surface-1);color:var(--text-primary);font-size:13px">'+
                '<button onclick="appAction(\'addRequisitionProduct\', {catId:\''+cat.id+'\', subId:\''+sub.id+'\', nestedId:\'\'})" style="padding:8px 10px;border-radius:6px;border:none;background:var(--text-accent,#185FA5);color:#fff;cursor:pointer">'+icon('plus',14)+'</button>'+
              '</div>';
            } else if (sub.type === 'temperatures'){
              sub.fridges.forEach(function(fridge, i){
                out += renderAdminStringRow(cat.id, sub.id, 'fridges', fridge, i, sub.fridges.length);
              });
              out += '<div style="display:flex;gap:6px;margin-top:8px;align-items:center">'+
                '<input id="new-fridge-'+cat.id+'-'+sub.id+'" placeholder="Nouveau frigo" style="flex:1;padding:8px;border-radius:6px;border:1px solid var(--border);background:var(--surface-1);color:var(--text-primary);font-size:13px">'+
                '<button onclick="appAction(\'addFridge\', {catId:\''+cat.id+'\', subId:\''+sub.id+'\'})" style="padding:8px 10px;border-radius:6px;border:none;background:var(--text-accent,#185FA5);color:#fff;cursor:pointer">'+icon('plus',14)+'</button>'+
              '</div>';
            } else if (sub.type === 'submenu'){
              sub.sublieux.forEach(function(nested){
                const nestedOpen = state.adminExpandedNested === nested.id;
                const nestedClickAction = nested.type === 'requisition'
                  ? "appAction('adminReqOpenEditor', {catId:'"+cat.id+"', subId:'"+nested.id+"'})"
                  : "appAction('adminToggleNested','"+nested.id+"')";
                out += '<div style="border:1px solid var(--border-strong,var(--border));border-radius:8px;background:var(--surface-1);overflow:hidden;margin-bottom:6px">';
                out += '<div onclick="'+nestedClickAction+'" style="display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer">'+
                  '<span style="flex:1;font-size:13px;font-weight:600;color:var(--text-primary)">'+esc(nested.name)+'</span>'+
                  '<span onclick="event.stopPropagation();appAction(\'deleteNestedSublieu\', {catId:\''+cat.id+'\', subId:\''+sub.id+'\', nestedId:\''+nested.id+'\'})" style="color:var(--text-danger,#A32D2D);cursor:pointer">'+icon('trash',13)+'</span>'+
                  (nested.type === 'requisition' ? icon('chevronRight',14) : '<span style="color:var(--text-muted);transform:rotate('+(nestedOpen?'180':'0')+'deg)">'+icon('chevronDown',14)+'</span>')+
                '</div>';
                if (nestedOpen){
                  out += '<div style="border-top:1px solid var(--border);padding:8px 10px">';
                  if (nested.type === 'requisition'){
                    nested.products.forEach(function(product, i){
                      out += renderAdminStringRow(cat.id, sub.id, 'products', product, i, nested.products.length, nested.id);
                    });
                    out += '<div style="display:flex;gap:6px;margin-top:6px;align-items:center">'+
                      '<input id="new-product-'+cat.id+'-'+sub.id+'-'+nested.id+'" placeholder="Nouveau produit" style="flex:1;padding:7px;border-radius:6px;border:1px solid var(--border);background:var(--surface-1);color:var(--text-primary);font-size:12px">'+
                      '<button onclick="appAction(\'addRequisitionProduct\', {catId:\''+cat.id+'\', subId:\''+sub.id+'\', nestedId:\''+nested.id+'\'})" style="padding:7px 9px;border-radius:6px;border:none;background:var(--text-accent,#185FA5);color:#fff;cursor:pointer">'+icon('plus',13)+'</button>'+
                    '</div>';
                  } else {
                    nested.tasks.forEach(function(t, ti){
                      out += renderAdminTaskRow(cat.id, nested.id, t, ti, nested.tasks.length);
                    });
                    out += '<div style="display:flex;gap:6px;margin-top:6px;align-items:center">'+
                      '<input id="new-task-label-'+cat.id+'-'+nested.id+'" placeholder="Nouvelle tâche" style="flex:1;padding:7px;border-radius:6px;border:1px solid var(--border);background:var(--surface-1);color:var(--text-primary);font-size:12px">'+
                      '<button onclick="appAction(\'addTask\', {catId:\''+cat.id+'\', subId:\''+nested.id+'\'})" style="padding:7px 9px;border-radius:6px;border:none;background:var(--text-accent,#185FA5);color:#fff;cursor:pointer">'+icon('plus',13)+'</button>'+
                    '</div>';
                  }
                  out += '</div>';
                }
                out += '</div>';
              });
            } else {
              sub.tasks.forEach(function(t, ti){
                out += renderAdminTaskRow(cat.id, sub.id, t, ti, sub.tasks.length);
              });
              out += '<div style="display:flex;gap:6px;margin-top:8px;align-items:center">'+
                '<input id="new-task-label-'+cat.id+'-'+sub.id+'" placeholder="Nouvelle tâche" style="flex:1;padding:8px;border-radius:6px;border:1px solid var(--border);background:var(--surface-1);color:var(--text-primary);font-size:13px">'+
                '<button onclick="appAction(\'addTask\', {catId:\''+cat.id+'\', subId:\''+sub.id+'\'})" style="padding:8px 10px;border-radius:6px;border:none;background:var(--text-accent,#185FA5);color:#fff;cursor:pointer">'+icon('plus',14)+'</button>'+
              '</div>';
            }
            out += '</div>';
          }
          out += '</div>';
        });

        out += '</div>';
      }
      out += '</div>';
    });

    out += '</div>';
    out += bottomNav('menu');
    return out;
  }

  function render(){
    const root = document.getElementById('app');
    if (state.loading){
      root.innerHTML = '<div style="padding:60px;text-align:center;color:var(--text-secondary)">Chargement…</div>';
      return;
    }
    let html = '';
    if (state.screen === 'login'){
      if (state.loginStep === 'simple') html = screenLoginSimple();
      else if (state.loginStep === 'manager-code') html = screenLoginManagerCode();
      else if (state.loginStep === 'manager-name') html = screenLoginManagerName();
      else if (state.loginStep === 'econome-code') html = screenLoginEconomeCode();
      else if (state.loginStep === 'entertainment-code') html = screenLoginEntertainmentCode();
      else if (state.loginStep === 'events-code') html = screenLoginEventsCode();
      else if (state.loginStep === 'rh-code') html = screenLoginRhCode();
      else if (state.loginStep === 'admin-code') html = screenLoginAdminCode();
    }
    else if (state.screen === 'home') html = screenHome();
    else if (state.screen === 'checklist') html = screenChecklist();
    else if (state.screen === 'pertes-form') html = screenPerteForm();
    else if (state.screen === 'temperatures-form') html = screenTemperatureForm();
    else if (state.screen === 'tracabilite-form') html = screenTracabiliteForm();
    else if (state.screen === 'requisition-form') html = screenRequisitionForm();
    else if (state.screen === 'manager-locked') html = screenManagerLocked();
    else if (state.screen === 'other-access-menu') html = screenOtherAccessMenu();
    else if (state.screen === 'access-management') html = screenAccessManagement();
    else if (state.screen === 'admin-requisition-editor') html = screenAdminRequisitionEditor();
    else if (state.screen === 'admin-menu') html = screenAdminMenu();
    else if (state.screen === 'mama-gang-management') html = screenMamaGangManagement();
    else if (state.screen === 'historique') html = screenHistorique();
    else if (state.screen === 'admin') html = screenAdmin();
    else if (state.screen === 'fermeture') html = screenFermeture();
    else if (state.screen === 'whatsup') html = screenWhatsup();
    else if (state.screen === 'manager-planning') html = screenManagerPlanning();
    else if (state.screen === 'planning-view') html = screenPlanningView();
    else if (state.screen === 'remontees') html = screenRemontees();
    else if (state.screen === 'view-feedbacks') html = screenViewFeedbacks();
    else if (state.screen === 'entertainment-list') html = screenEntertainmentList();
    else if (state.screen === 'entertainment-form') html = screenEntertainmentForm();
    else if (state.screen === 'events-list') html = screenEventsList();
    else if (state.screen === 'events-form') html = screenEventsForm();
    else if (state.screen === 'rh-list') html = screenRhList();
    else if (state.screen === 'rh-form') html = screenRhForm();
    else if (state.screen === 'manager-menu') html = screenManagerMenu();
    else if (state.screen === 'econome-days') html = screenEconomeDays();
    else if (state.screen === 'econome-day-reports') html = screenEconomeDayReports();
    else if (state.screen === 'econome-report-detail') html = screenEconomeReportDetail();
    if (state.globalError){
      html = '<div style="margin:16px;padding:16px;border-radius:10px;background:#FDECEC;border:2px solid #A32D2D;color:#A32D2D;font-size:13px">'+
        '<strong>Erreur technique :</strong> '+esc(state.globalError)+
        '<div onclick="appAction(\'dismissGlobalError\')" style="margin-top:10px;text-decoration:underline;cursor:pointer;font-weight:700">Fermer</div>'+
      '</div>' + html;
    }
    root.innerHTML = html;
    const todayCard = document.getElementById('whatsup-today-card');
    if (todayCard && todayCard.scrollIntoView){
      todayCard.scrollIntoView({ behavior: 'auto', inline: 'center', block: 'nearest' });
    }
  }

  init();
})();
</script>
</body>
</html>
